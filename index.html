<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yan Birthday Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="game-container">
        <img src="assets/black_wall.png" id="inner-wall" class="layer background-inner fade-in-awal hidden">
        <img src="assets/out_wall.png" class="layer background-outer fade-in-awal">
        <img src="assets/door1.png" id="main-door" class="layer door fade-in-awal" style="pointer-events: auto;">
        
        <div id="dialog-box" class="hidden">
            <div class="dialog-content">
                <p id="dialog-text"></p>
                <span class="next-arrow">▼</span>
            </div>
        </div>

        <div id="key-selection" class="hidden">
            <img src="assets/key_blackout.png" class="key-bg fade-blackout">
            
            <div class="key-wrapper fade-key">
                <img src="assets/key1.png" id="current-key" class="key-img">
            </div>
            
            <div class="button-container fade-buttons">
                <button onclick="checkKey()">Kayaknya yang ini, coba dulu ah (⁠＾⁠3⁠＾⁠♪</button>
                <button onclick="nextKey()">Hmm.. kayaknya bukan ini, coba kunci yang lain (⁠づ⁠￣⁠ ⁠³⁠￣⁠)⁠づ</button>
            </div>
        </div>
    
        <div id="notification" class="notif hidden"></div>
        
        <div id="total-blackout" class="hidden"></div>
      
    </div>

    <div id="cake-scene" class="cake-container hidden">
        <img src="assets/cake/cake_blackout.png" class="layer-cake blackout-overlay">
        <img src="assets/cake/cake1.png" id="main-cake" class="layer-cake">
        
        <div id="liv-bubble" class="chat-bubble liv-pos hidden">
            <p id="liv-text"></p>
        </div>
    
        <div id="action-bubble" class="chat-bubble action-pos hidden" onclick="prosesTiupLilin()">
            <p>tiup lilin</p>
        </div>
    
        <div id="user-dialog-landscape" class="user-dialog-ls hidden">
            <div class="dialog-content">
                <p id="user-text-ls"></p>
                <span class="next-arrow">▼</span>
            </div>
        </div>
    </div>


    <audio id="sfx-salah" src="assets/sfx_salah.mp3"></audio>
    <audio id="sfx-benar" src="assets/sfx_benar.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
